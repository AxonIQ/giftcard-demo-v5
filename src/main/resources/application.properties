spring.application.name=GiftCard Demo

# Location of offine license file
# axoniq.license.file=./axoniq.license

# Set to false to disable the demo scheduler that generates random gift card activity.
# giftcard.scheduler.enabled=true

# H2 database with on-disk storage for the read-model projection (GiftCardProjection) and the tracking
# tokens (Axon's auto-configured JdbcTokenStore). Both persist across restarts under ./data/, so the
# projection resumes instead of rebuilding from the full event stream.
spring.datasource.url=jdbc:h2:file:./data/giftcards;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Create the projection and token tables from schema.sql on startup (idempotent CREATE TABLE IF NOT EXISTS).
spring.sql.init.mode=always
